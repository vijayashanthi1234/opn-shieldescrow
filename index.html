    <script>
        let provider, signer;
        // The contract address provided in your original template
        const contractAddress = "0xa0772b29afBc2538DDfF50Ae72DA61Ab4725536A";
        const contractABI = [
            "function deposit() external payable",
            "function release() external"
        ];

        // 1. Core Connection Routine
        async function connectWallet() {
            // Check if a Web3 browser extension like MetaMask is installed
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Prompt user to grant account read permissions
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const activeAccount = accounts[0];

                    // Cache provider and signing authorizations
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    // Dynamically update UI visual layers to reflects successful connection
                    document.getElementById('walletAddress').innerText = activeAccount;
                    
                    const statusText = document.getElementById('walletStatus');
                    statusText.innerText = "Connected";
                    statusText.style.color = "var(--neon-green)";

                    const indicator = document.getElementById('indStatus');
                    indicator.className = "indicator ind-active";

                    console.log("Wallet connection authorized successfully: ", activeAccount);
                } catch (error) {
                    console.error("User rejected wallet connection clearance requested:", error);
                    alert("Connection Refused: Please authorize the connection request inside your wallet extension.");
                }
            } else {
                alert("Cryptographic provider undetected. Please install MetaMask to use this secure interface.");
            }
        }

        // 2. Action 01 Handler: Initialize Collateral Deposit
        async function triggerDeposit() {
            if (!signer) {
                alert("Execution Halted: Please establish a secure network connection first.");
                return;
            }
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                // Prompt user for input transaction value (example default: 0.1 ETH or platform native unit)
                const depositAmount = prompt("Enter collateral volume to deposit (in native units, e.g., 0.1):", "0.1");
                if (!depositAmount) return;

                alert("Dispatching transaction request... Please authorize in your wallet.");
                const tx = await contract.deposit({
                    value: ethers.utils.parseEther(depositAmount)
                });
                await tx.wait();
                alert("Collateral asset deposit state finalized successfully!");
            } catch (error) {
                console.error("Deposit interaction vector failed:", error);
                alert("Execution Failed: See console log data for error signature specifics.");
            }
        }

        // 3. Action 02 Handler: Authorize Asset Settlement Release
        async function triggerRelease() {
            if (!signer) {
                alert("Execution Halted: Please establish a secure network connection first.");
                return;
            }
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                alert("Dispatching authorization request... Please sign in your wallet.");
                const tx = await contract.release();
                await tx.wait();
                alert("Settlement framework released and balanced successfully!");
            } catch (error) {
                console.error("Release interaction vector failed:", error);
                alert("Execution Failed: See console log data for error signature specifics.");
            }
        }

        // Operational Safeguard: Listen for account alterations mid-session
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if(accounts.length === 0) {
                    // Reset UI if user manual disconnects from within the wallet extension app
                    document.getElementById('walletAddress').innerText = "0x...";
                    const statusText = document.getElementById('walletStatus');
                    statusText.innerText = "Disconnected";
                    statusText.style.color = "var(--neon-red)";
                    document.getElementById('indStatus').className = "indicator ind-disconnected";
                    signer = null;
                } else {
                    connectWallet();
                }
            });
        }
    </script>
</body>
</html>
