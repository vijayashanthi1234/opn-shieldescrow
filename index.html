    <script>
        let provider, signer;
        // Seed default display address string safely
        let connectedAccount = "0xF10B286940e6Aa72b8EAC394b3259A06eF239753"; 
        
        const contractAddress = "0xa0772b29afBc2538DDfF50Ae72DA61Ab4725536A";
        const contractABI = [
            "function deposit() external payable",
            "function release() external"
        ];

        const OPN_TESTNET_PARAMS = {
            chainId: "0x2bf7", 
            chainName: "OPN Testnet",
            nativeCurrency: { name: "OPN Token", symbol: "OPN", decimals: 18 },
            rpcUrls: ["https://iopn.tech"], 
            blockExplorerUrls: ["https://iopn.tech"]
        };

        async function enforceNetwork() {
            if (!window.ethereum) return;
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: OPN_TESTNET_PARAMS.chainId }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [OPN_TESTNET_PARAMS],
                        });
                    } catch (addError) {
                        console.error("Network add failure:", addError);
                    }
                }
            }
        }

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const connectBtn = document.getElementById('connectBtn');
                    connectBtn.innerText = "Requesting Clearance...";

                    // Align network variables immediately
                    await enforceNetwork();

                    // Standard direct RPC call sequence wrapper
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    if (!accounts || accounts.length === 0) {
                        alert("No active accounts found in MetaMask provider extension.");
                        connectBtn.innerText = "Establish Connection";
                        return;
                    }

                    // CRITICAL STRING FIX: Convert account array index 0 cleanly to a plain text string
                    connectedAccount = String(accounts[0]); 
                    
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    // Dynamically alter dashboard layout states
                    document.getElementById('walletAddress').innerText = connectedAccount;
                    
                    const statusText = document.getElementById('walletStatus');
                    statusText.innerText = "Connected (OPN Chain)";
                    statusText.style.color = "var(--neon-green)";

                    document.getElementById('indStatus').className = "indicator ind-active";
                    connectBtn.innerText = "Connection Established";
                    connectBtn.disabled = true;

                    console.log("Secure Bridge Anchored Successfully To:", connectedAccount);
                } catch (error) {
                    console.error("Internal connection runtime block:", error);
                    document.getElementById('connectBtn').innerText = "Establish Connection";
                    alert("Connection Stopped: Please open your MetaMask window manually to authorize the session.");
                }
            } else {
                alert("MetaMask wallet extension provider undetected.");
            }
        }

        async function triggerDeposit() {
            if (!signer) return alert("Execution Refused: Please establish a secure bridge connection first.");
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                const depositAmount = prompt("Enter collateral volume to deposit (OPN):", "0.1");
                if (!depositAmount) return;

                const tx = await contract.deposit({ value: ethers.utils.parseEther(depositAmount) });
                alert("Transaction Broadcasted Successfully! Tracking Hash: " + tx.hash);
                await tx.wait();
                alert("Collateral asset state finalized successfully on OPN Chain!");
            } catch (error) {
                console.error("Deposit execution vector failed:", error);
                alert("Transaction rejected or reverted.");
            }
        }

        async function triggerRelease() {
            if (!signer) return alert("Execution Refused: Please establish a secure bridge connection first.");
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                const tx = await contract.release();
                alert("Transaction Broadcasted Successfully! Tracking Hash: " + tx.hash);
                await tx.wait();
                alert("Settlement framework released successfully on OPN Chain!");
            } catch (error) {
                console.error("Release execution vector failed:", error);
                alert("Transaction rejected or reverted.");
            }
        }
    </script>
