<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPN ShieldEscrow & DeFi Terminal</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #080b11; --card: #111622; --input: #181f30; --blue: #0052ff; --green: #00c853; --text: #fff; --muted: #707e94; --border: #1e2638; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(8,11,17,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 11px; background: #0052ff22; color: #0052ff; padding: 3px 10px; border-radius: 20px; border: 1px solid #0052ff44; }
        .nav { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-outline:hover { border-color: #444; color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-blue:hover { background: #0045d9; }
        .btn-blue:disabled { opacity: 0.5; cursor: not-allowed; }
        .container { max-width: 560px; margin: 40px auto; padding: 0 16px; }
        .tabs { display: flex; background: var(--card); padding: 5px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 11px 0; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .tab-btn.active { background: var(--input); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .card { background: var(--card); border-radius: 20px; padding: 28px; border: 1px solid var(--border); }
        .panel { display: none; } .panel.active { display: block; }
        .panel h2 { font-size: 17px; margin-bottom: 16px; margin-top: 20px; }
        .panel h2:first-child { margin-top: 0; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input, .input-group select { width: 100%; padding: 13px 14px; background: var(--input); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; font-size: 14px; transition: border 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: #0052ff; }
        .input-group select option { background: #111622; }
    </style>
</head>
        <!-- ====== SWAP PANEL ====== -->
        <div id="panel-swap" class="panel">
            <h2>🔄 OPN Automated Swap</h2>
            <div class="input-group">
                <label>Pay</label>
                <input type="number" id="swapPayInput" value="10" step="0.1">
                <select style="margin-top:6px;"><option>OPN</option></select>
            </div>
            <div class="input-group">
                <label>Receive (Estimated)</label>
                <input type="number" id="swapReceiveInput" value="0.045" readonly>
                <select style="margin-top:6px;"><option>shOPN</option></select>
            </div>
            <button onclick="runDeFiAlert('Swap')" class="submit-btn blue">Execute Token Swap</button>
        </div>

        <!-- ====== BRIDGE PANEL ====== -->
        <div id="panel-bridge" class="panel">
            <h2>🌉 Sovereign Interchain Bridge</h2>
            <div class="input-group">
                <label>From Network</label>
                <select><option>OPN Chain Testnet</option></select>
            </div>
            <div class="input-group">
                <label>To Network Target</label>
                <select><option>Ethereum Sepolia</option></select>
            </div>
            <div class="input-group">
                <label>Amount to Bridge</label>
                <input type="number" value="1" step="0.1">
            </div>
            <button onclick="runDeFiAlert('Bridge')" class="submit-btn blue">Initiate Bridge</button>
        </div>

        <!-- ====== STAKE PANEL ====== -->
        <div id="panel-stake" class="panel">
            <h2>💰 Ecosystem Liquidity Staking</h2>
            <div class="input-group">
                <label>Staking Amount</label>
                <input type="number" value="100" placeholder="Minimum 10 OPN">
            </div>
            <button onclick="runDeFiAlert('Staking')" class="submit-btn blue">Stake Assets</button>
        </div>
        
        <!-- Status Bar and Chain Info Elements -->
        <div id="statusBar">🔌 Click "Connect Wallet" to get started</div>
        <div class="chain-info">
            <span id="chainDot" class="dot red"></span> 
            <span id="chainText">Not connected</span>
        </div>
    </div>
</div>
<script>
    // உங்கள் OPN டெஸ்ட்நெட் கான்ட்ராக்ட் முகவரி மற்றும் ABI அமைப்புகள்
    const contractAddress = "0xa0772b29afBc2538DDfF58Ae72DA61Ab4725536A";

    const contractABI = [
        "function deposit(bytes32 secretHash) public payable",
        "function claimPayout(string memory secretWord) public",
        "function lockDuration() public view returns (uint256)"
    ];

    let provider;
    let signer;
    let escrowContract;

    const statusBar = document.getElementById("statusBar");
    const chainDot = document.getElementById("chainDot");
    const chainText = document.getElementById("chainText");

    function setStatus(text, type = "") {
        statusBar.className = type;
        statusBar.innerText = text;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        // Tab மாறும்போது எர்ரர் வராமல் தடுக்க currentTarget பயன்படுத்தப்படுகிறது
        if(event && event.currentTarget) {
            event.currentTarget.classList.add('active');
        }
        document.getElementById('panel-' + tabId).classList.add('active');
    }

    // மெட்டாமஸ்க் வாலட் இணைக்கும் பகுதி
    async function connectWallet() {
        if (!window.ethereum) {
            setStatus("MetaMask is not installed!", "error");
            return;
        }
        try {
            setStatus("Connecting wallet...", "loading");
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const address = await signer.getAddress();
            
            document.getElementById("connectBtn").innerText = address.substring(0, 6) + "..." + address.substring(38);
            escrowContract = new ethers.Contract(contractAddress, contractABI, signer);
            
            document.getElementById("depositBtn").disabled = false;
            document.getElementById("claimBtn").disabled = false;

            chainDot.className = "dot green";
            chainText.innerText = "Connected to OPN Testnet";
            setStatus("Wallet connected successfully!", "success");
        } catch (err) {
            setStatus("Connection failed: " + err.message, "error");
        }
    }

    // டெபாசிட் செய்யும் லாஜிக்
    async function depositToEscrow() {
        const secret = document.getElementById("secretInput").value;
        if (!secret) { setStatus("Enter a secret word!", "warning"); return; }
        try {
            setStatus("Processing deposit...", "loading");
            const secretHash = ethers.utils.solidityKeccak256(["string"], [secret]);
            const tx = await escrowContract.deposit(secretHash, { value: ethers.utils.parseEther("0.1") });
            setStatus("Transaction pending...", "loading");
            await tx.wait();
            setStatus("0.1 OPN deposited successfully!", "success");
        } catch (err) {
            setStatus("Deposit failed: " + (err.reason || err.message), "error");
        }
    }

    // பணத்தை திரும்பப் பெறும் (Claim) லாஜிக்
    async function claimEscrow() {
        const secret = document.getElementById("claimSecretInput").value;
        if (!secret) { setStatus("Enter the original secret word!", "warning"); return; }
        try {
            setStatus("Submitting payout claim...", "loading");
            const tx = await escrowContract.claimPayout(secret);
            setStatus("Claim pending...", "loading");
            await tx.wait();
            setStatus("Payout claimed successfully!", "success");
        } catch (err) {
            console.error(err);
            let errorReason = err.reason || (err.data && err.data.message) || err.message;
            if (errorReason.includes("execution reverted") || errorReason.includes("CALL_EXCEPTION")) {
                errorReason = "CALL_EXCEPTION: லாக் காலம் இன்னும் முடியவில்லை அல்லது ரகசிய வார்த்தை தவறு!";
            }
            setStatus("Claim failed: " + errorReason, "error");
        }
    }

    function runDeFiAlert(action) {
        alert(action + " feature is a mock-up for DeFi Terminal UI testing!");
    }
</script>
</body>
</html>
