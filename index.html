<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPN ShieldEscrow</title>
    
    <!-- Ethers.js CDN (வாலட் மற்றும் காண்ட்ராக்ட் தொடர்புகளுக்குத் தேவை) -->
    <script src="https://cloudflare.com"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #131823;
            --primary-blue: #0052ff;
            --text-color: #ffffff;
            --text-muted: #8a99ad;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(11, 14, 20, 0.8);
            border-bottom: 1px solid #1c2231;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-blue {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-blue:hover {
            background-color: #0042cc;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid #2c354a;
            color: var(--text-muted);
        }

        /* Container & Main App */
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: #1c2231;
            color: var(--text-muted);
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .tab-btn.active {
            background-color: var(--primary-blue);
            color: white;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid #1c2231;
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: #0b0e14;
            border: 1px solid #2c354a;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* History Table */
        .history-section {
            margin-top: 40px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #1c2231;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 15px;
        }

        th {
            color: var(--text-muted);
            padding: 12px;
            border-bottom: 1px solid #2c354a;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #1c2231;
            font-size: 15px;
        }

        .status-badge {
            color: #00ff88;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo">🛡️ OPN ShieldEscrow</div>
        <div class="nav-buttons">
            <button class="btn btn-outline">DeFi Terminal</button>
            <!-- வாலட் பட்டன் இடி (ID) மற்றும் ஆன்-கிளிக் சேர்க்கப்பட்டுள்ளது -->
            <button id="connectButton" onclick="connectWallet()" class="btn btn-blue">Connect Wallet</button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active">Escrow</button>
            <button class="tab-btn">Swap</button>
            <button class="tab-btn">Bridge</button>
            <button class="tab-btn">Stake</button>
        </div>

        <!-- Main Escrow Vault Card -->
        <div class="card">
            <h2>Commit-Reveal Escrow Vault</h2>
            <div class="subtitle">Lock collateral using commitment-based parameters safely into ShieldEscrow.</div>
            
            <div class="input-group">
                <label for="escrowValue">Escrow Value (OPN):</label>
                <input type="number" id="escrowValue" value="0.1" step="0.01" min="0">
            </div>

            <button onclick="depositToEscrow()" class="submit-btn">Deposit to Escrow</button>
        </div>

        <!-- Escrow History (புதிதாக சேர்க்கப்பட்ட அம்சம்) -->
        <div class="history-section">
            <h3 style="margin-top: 0;">Escrow பரிவர்த்தனை வரலாறு</h3>
            <table>
                <thead>
                    <tr>
                        <th>மதிப்பு (OPN)</th>
                        <th>லாக் காலம்</th>
                        <th>நிலை (Status)</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td>0.1 OPN</td>
                        <td>24 Hours</td>
                        <td><span class="status-badge">Locked</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- வாலட் மற்றும் காண்ட்ராக்ட் இயக்கும் ஜாவாஸ்கிரிப்ட் குறியீடு -->
    <script>
        let userWalletAddress = "";

        // 1. வாலட் இணைக்கும் முதன்மை செயல்பாடு
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // வாலட் கணக்குகளைக் கோருதல்
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userWalletAddress = accounts[0];
                    
                    // பொத்தானின் உரையை (Text) சுருக்கப்பட்ட முகவரியாக மாற்றுதல்
                    const shortAddress = `${userWalletAddress.substring(0, 6)}...${userWalletAddress.substring(38)}`;
                    document.getElementById("connectButton").innerText = `இணைக்கப்பட்டது: ${shortAddress}`;
                    document.getElementById("connectButton").style.backgroundColor = "#1c2231";
                    
                    // OPN சங்கிலி நெட்வொர்க்கிற்கு மாற்றுவதை சரிபார்த்தல் (Chain ID: 500 = Hex: 0x1F4)
                    await checkAndSwitchNetwork();

                } catch (error) {
                    console.error("வாலட் இணைப்பில் பிழை:", error);
                    alert("வாலட் இணைப்பை பயனர் நிராகரித்துவிட்டார்.");
                }
            } else {
                alert("தயவுசெய்து உங்கள் பிரவுசரில் MetaMask Extension-ஐ நிறுவவும்!");
            }
        }

        // 2. OPN RPC நெட்வொர்க் சரிபார்ப்பு செயல்பாடு
        async function checkAndSwitchNetwork() {
            const opnChainIdHex = '0x1F4'; // Chain ID 500 இன் Hex வடிவம்
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: opnChainIdHex }],
                });
            } catch (switchError) {
                // நெட்வொர்க் MetaMask இல் இல்லை எனில், அதைத் தானாகவே சேர்த்தல்
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: opnChainIdHex,
                                chainName: 'OPN Chain',
                                nativeCurrency: { name: 'OPN', symbol: 'OPN', decimals: 18 },
                                rpcUrls: ['https://iopn.tech'],
                                blockExplorerUrls: ['https://iopn.tech']
                            }],
                        });
                    } catch (addError) {
                        console.error("நெட்வொர்க் சேர்ப்பதில் பிழை:", addError);
                    }
                }
            }
        }

        // 3. டெபாசிட் பொத்தானுக்கான தற்காலிக செயல்பாடு
        async function depositToEscrow() {
            if (!userWalletAddress) {
                alert("தயவுசெய்து முதலில் வாலட்டை (Connect Wallet) இணைக்கவும்!");
                return;
            }
            const value = document.getElementById("escrowValue").value;
