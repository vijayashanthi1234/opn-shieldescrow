<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPN Shield Escrow Dashboard</title>
    <style>
        body { background-color: #0b0813; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #130f22; border: 1px solid #231b3a; padding: 24px; border-radius: 12px; }
        .btn { background: #8247e5; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #9662ea; }
        .status { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 40px;">🛡️ OPN Shield Escrow</h1>
    <div class="grid">
        <div class="card">
            <h3>Wallet Portal</h3>
            <p>Status: <span class="status">Connected</span></p>
            <p style="font-size: 12px; color: #aaa;">Address: 0xfF08...9753</p>
            <button class="btn">Disconnect Wallet</button>
        </div>
        <div class="card">
            <h3>Escrow Actions</h3>
            <button class="btn" style="margin-bottom: 10px;">🔒 Deposit Secure Funds</button>
            <button class="btn" style="background: #231b3a; border: 1px solid #8247e5;">🔓 Release To Seller</button>
        </div>
        <div class="card">
            <h3>Contract Security Metrics</h3>
            <p>Active System State: <span style="color: #ff3366;">Active / Unpaused</span></p>
            <p>Total Guarded Vaults: <span class="status">0 Live</span></p>
        </div>
    </div>
</body>
</html>
