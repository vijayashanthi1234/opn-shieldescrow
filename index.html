<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPN Shield Escrow Dashboard</title>
    <style>
        body { background-color: #0b0813; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #130f22; border: 1px solid #231b3a; padding: 24px; border-radius: 12px; }
        .btn { background: #8247e5; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #9662ea; }
        .status { color: #00ffcc; font-weight: bold; }
    </style>
    <!-- Fixed: Using correct stable Ethers v5 CDN package -->
    <script src="https://cloudflare.com" type="text/javascript"></script>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 40px;">🛡️ OPN Shield Escrow</h1>
    <div class="grid">
        <div class="card">
            <h3>Wallet Portal</h3>
            <p>Status: <span id="walletStatus" style="color: #ff3366;">Disconnected</span></p>
            <p style="font-size: 12px; color: #aaa; word-break: break-all;">Address: <span id="walletAddress">0x...</span></p>
            <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        </div>
        <div class="card">
            <h3>Escrow Actions</h3>
            <button class="btn" style="margin-bottom: 10px;" onclick="triggerDeposit()">🔒 Deposit Secure Funds</button>
            <button class="btn" style="background: #231b3a; border: 1px solid #8247e5;" onclick="triggerRelease()">🔓 Release To Seller</button>
        </div>
        <div class="card">
            <h3>Contract Security Metrics</h3>
            <p>Active System State: <span style="color: #00ffcc;">Active / Unpaused</span></p>
            <p>Total Guarded Vaults: <span class="status">1 Live</span></p>
        </div>
    </div>

    <script>
        let provider, signer;

        // Your specific OPN Chain contract deployment configuration
        const contractAddress = "0xa0772b29af8c2538DDfF50Ae72DA61Ab4725536A";
        const contractABI = [
            "function deposit() external payable",
            "function release() external"
        ];

        async function connectWallet() {
            const ethersInstance = window.ethers;
            
            if (window.ethereum && ethersInstance) {
                try {
                    provider = new ethersInstance.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    
                    // Fixed: In Ethers v5, getSigner() is synchronous. No await needed.
                    signer = provider.getSigner();
                    const address = await signer.getAddress();

                    document.getElementById("walletStatus").innerText = "Connected";
                    document.getElementById("walletStatus").style.color = "#00ffcc";
                    document.getElementById("walletAddress").innerText = address;
                    document.getElementById("connectBtn").innerText = "Wallet Linked";
                } catch (error) {
                    alert("Connection rejected: " + error.message);
                }
            } else {
                alert("Ethers Library build initialization failure. Please reload page.");
            }
        }

        async function triggerDeposit() {
            if (!signer) return alert("Please link your Web3 Wallet portal first!");
            
            try {
                const escrowContract = new ethers.Contract(contractAddress, contractABI, signer);
                
                // Triggers a real transaction sending 0.1 OPN tokens as a security deposit
                const tx = await escrowContract.deposit({ value: ethers.utils.parseEther("0.1") });
                alert("Deposit transaction dispatched! Awaiting blockchain verification...");
                
                await tx.wait();
                alert("Success! Funds safely locked within Shield Escrow Vault.");
            } catch (error) {
                console.error(error);
                alert("Transaction failed: " + error.message);
            }
        }

        async function triggerRelease() {
            if (!signer) return alert("Please link your Web3 Wallet portal first!");
            
            try {
                const escrowContract = new ethers.Contract(contractAddress, contractABI, signer);
                
                const tx = await escrowContract.release();
                alert("Release authorization dispatched! Awaiting blockchain verification...");
                
                await tx.wait();
                alert("Success! Escrowed funds have been safely transferred to the seller.");
            } catch (error) {
                console.error(error);
                alert("Transaction failed: " + error.message);
            }
        }
    </script>
</body>
</html>
