<script>
const connectBtn = document.getElementById("connectBtn");
const walletInfo = document.getElementById("walletInfo");
const contractAddress = "0xa0772b29afBc2538DDfF58Ae72DA61Ab4725536A";

let userAccount = "";

connectBtn.addEventListener("click", async () => {
if (typeof window.ethereum === 'undefined') {
walletInfo.innerHTML = "❌ MetaMask not detected. Please install it!";
return;
}
try {
const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
const chainId = await window.ethereum.request({ method: 'eth_chainId' });
userAccount = accounts[0];

connectBtn.innerText = "Wallet Connected ✅";
walletInfo.innerHTML = `Connected Account: ${userAccount.slice(0,6)}...${userAccount.slice(-4)}<br>Network Chain ID: ${parseInt(chainId, 16)}`;
} catch (err) {
console.error(err);
walletInfo.innerHTML = "❌ Connection failed: " + err.message;
}
});

// பிரவுசரின் நேடிவ் SHA-256 மூலம் பாதுகாப்பான bytes32 ஹாஷ் உருவாக்கும் முறை
async function sha256Bytes32(message) {
const msgBuffer = new TextEncoder().encode(message);
const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));
const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
return "0x" + hashHex;
}

async function createEscrowDeposit() {
if (!userAccount) return alert("Please connect your wallet first using 'Connect Wallet' button!");
const secret = document.getElementById("secretPhrase").value;
const amount = document.getElementById("depositAmount").value;
const statusBox = document.getElementById("statusBox");

if (!secret || !amount) return alert("Please fill both fields!");

try {
statusBox.style.display = "block";
statusBox.innerText = "Generating cryptographic commitment natively...";

// Generate safe bytes32 commitment hash
const commitmentHex = await sha256Bytes32(secret);

// Convert amount to hex Wei format
const weiValue = (parseFloat(amount) * 1e18).toString(16);
const valueHex = "0x" + weiValue;

// Method ID for deposit(bytes32) is exactly 0x0d40b904
const cleanCommitment = commitmentHex.replace("0x", "");
const finalData = "0x0d40b904" + cleanCommitment;

const transactionParameters = {
to: contractAddress,
from: userAccount,
value: valueHex,
data: finalData
};

statusBox.innerText = "Please confirm the transaction in MetaMask...";
const txHash = await window.ethereum.request({
method: 'eth_sendTransaction',
params: [transactionParameters],
});

statusBox.innerText = `🟢 Transaction submitted successfully! Tx Hash: ${txHash}`;
} catch (err) {
console.error(err);
statusBox.style.display = "block";
statusBox.innerText = `❌ Error: ${err.message}`;
}
}
</script>
