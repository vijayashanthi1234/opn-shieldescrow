    <script>
        const OPN_CHAIN_ID = '0x3D8'; 
        const ESCROW_CONTRACT = "0xa0772b29afBc2538DDfF58Ae72DA61Ab4725536A";
        
        // Arena DEX பாணியில் பரிவர்த்தனை செய்ய OPN Chain-ன் அதிகாரப்பூர்வ DeFi Router முகவரி
        const DEX_ROUTER_ADDRESS = "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"; 

        // மேம்படுத்தப்பட்ட ABI (Escrow மற்றும் DEX Swap இரண்டிற்குமானது)
        const COMBINED_ABI = [
            "function depositToEscrow(bytes32 _commitment, uint256 _duration) external payable",
            "function claimEscrow(string calldata _secret) external",
            "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)"
        ];

        let provider, signer, escrowContract, dexContract;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`panel-${tabName}`).classList.add('active');
        }

        // 1. வாலட் இணைப்பு
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: OPN_CHAIN_ID }] });
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    const userAddress = accounts[0];
                    const shortAddress = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
                    document.getElementById("connectButton").innerText = shortAddress;
                    
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    
                    // கான்ட்ராக்ட் இணைப்புகள்
                    escrowContract = new ethers.Contract(ESCROW_CONTRACT, COMBINED_ABI, signer);
                    dexContract = new ethers.Contract(DEX_ROUTER_ADDRESS, COMBINED_ABI, signer);
                    
                    document.getElementById("statusText").innerText = "Connected to OPN Testnet successfully!";
                } catch (error) {
                    console.error(error);
                    document.getElementById("statusText").innerText = "Connection failed.";
                }
            } else {
                alert("Please install MetaMask!");
            }
        }

        // 2. எஸ்க்ரோ டெபாசிட்
        async function depositToEscrow() {
            if(!escrowContract) return alert("Please connect wallet first!");
            try {
                const secret = document.getElementById("secretInput").value;
                const duration = document.getElementById("durationInput").value;
                if(!secret) return alert("Please enter secret!");
                const commitment = ethers.utils.solidityKeccak256(["string"], [secret]);
                const amount = ethers.utils.parseEther("0.1");
                
                const tx = await escrowContract.depositToEscrow(commitment, duration, { value: amount });
                document.getElementById("statusText").innerText = "Broadcasting escrow payload...";
                await tx.wait();
                document.getElementById("statusText").innerText = "0.1 OPN locked successfully!";
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        // 3. ஏரினா DEX போல அசல் Swap-ஐ ட்ரிக்கர் செய்யும் புதிய செயல்பாடு!
        async function executeSwap() {
            if(!dexContract) return alert("Please connect wallet first!");
            try {
                document.getElementById("statusText").innerText = "Initiating Arena Swap Payout...";
                const amountIn = ethers.utils.parseEther("0.1"); // 0.1 OPN Swap செய்ய
                const deadline = Math.floor(Date.now() / 1000) + 60 * 20; // 20 நிமிடங்கள் கால அவகாசம்
                
                // OPN-ல் இருந்து shOPN டோக்கனுக்கு மாற்றுவதற்கான அட்ரஸ் பாத் (Sample Path)
                const path = ["0xWETH_OPN_ADDRESS_HERE", "0xTOKEN_ADDRESS_HERE"]; 

                // ஏரினா தளம் போலவே மெட்டாமஸ்க் வாலட்டைத் தானாகத் திறந்து Swap பரிவர்த்தனையைக் கேட்கும்
                const tx = await dexContract.swapExactETHForTokens(
                    0, 
                    path, 
                    await signer.getAddress(), 
                    deadline, 
                    { value: amountIn }
                );
                
                await tx.wait();
                document.getElementById("statusText").innerText = "Swap executed successfully via OPN Router!";
            } catch (error) {
                alert("Swap Failed: " + error.message);
            }
        }

        async function claimEscrow() {
            if(!escrowContract) return alert("Please connect wallet first!");
            try {
                const secret = document.getElementById("claimSecretInput").value;
                if(!secret) return alert("Please enter secret word!");
                const tx = await escrowContract.claimEscrow(secret);
                document.getElementById("statusText").innerText = "Broadcasting claim signature...";
                await tx.wait();
                document.getElementById("statusText").innerText = "Payout routed to wallet successfully!";
            } catch (error) {
                alert("Claim Failed: " + error.message);
            }
        }

        function runDeFiAlert(moduleName) {
            if(moduleName === 'Swap') {
                executeSwap(); // Swap பிரிவில் இருந்தால் நேரடியாக அசல் ஏரினா ஸ்வாப் இயங்கும்
            } else {
                alert(`OPN ${moduleName} feature will launch in Builder Season 2. Currently, Escrow and Swap matrix operations are live.`);
            }
        }
    </script>
