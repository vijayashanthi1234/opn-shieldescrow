<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPN ShieldEscrow & DeFi Terminal</title>
    <!-- ✅ Correct Ethers.js CDN + backup -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --bg-color: #080b11; --card-bg: #111622; --input-bg: #181f30; --primary-blue: #0052ff; --primary-green: #00c853; --text-color: #ffffff; --text-muted: #707e94; --border-color: #1e2638; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(8, 11, 17, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: 700; } .nav-buttons { display: flex; gap: 15px; }
        .btn { padding: 10px 22px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-blue { background-color: var(--primary-blue); color: white; } .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }
        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .tabs { display: flex; background-color: var(--card-bg); padding: 6px; border-radius: 14px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .tab-btn { flex: 1; background-color: transparent; color: var(--text-muted); padding: 12px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background-color: var(--input-bg); color: white; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid var(--border-color); }
        .panel-content { display: none; } .panel-content.active { display: block; }
        .input-group { text-align: left; margin-bottom: 20px; } label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; }
        input, select { width: 100%; padding: 14px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        .submit-btn { width: 100%; padding: 16px; background-color: var(--primary-blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .submit-btn-green { background-color: var(--primary-green); }
        #statusText { color: #00ffff; font-weight: 600; margin-top: 20px; text-align: center; padding: 15px; }
        #debugLog { margin-top: 15px; padding: 10px; background: #0a0e17; border: 1px solid #1e2638; border-radius: 10px; font-size: 12px; color: #ffaa00; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; display: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🛡️ OPN ShieldEscrow</div>
        <div class="nav-buttons">
            <button class="btn btn-outline">Builder v1.4</button>
            <button id="connectButton" onclick="connectWallet()" class="btn btn-blue">🔗 Connect Wallet</button>
        </div>
    </header>
    <div class="container">
        <div class="tabs">
            <button id="tab-escrow" class="tab-btn active" onclick="switchTab('escrow')">Escrow</button>
            <button id="tab-swap" class="tab-btn" onclick="switchTab('swap')">Swap</button>
            <button id="tab-bridge" class="tab-btn" onclick="switchTab('bridge')">Bridge</button>
            <button id="tab-stake" class="tab-btn" onclick="switchTab('stake')">Stake</button>
        </div>
        <div class="card">
            <div id="panel-escrow" class="panel-content active">
                <h2>🔒 Commit-Reveal Escrow Vault</h2>
                <div class="input-group"><label>Secret Word:</label><input type="text" id="secretInput" placeholder="Enter custom phrase string"></div>
                <div class="input-group"><label>Lock Duration (Seconds):</label><input type="number" id="durationInput" value="86400"></div>
                <button onclick="depositToEscrow()" class="submit-btn">Deposit 0.1 OPN to Escrow</button>
                <h2>🔓 Claim Escrow Payout</h2>
                <div class="input-group"><label>Original Secret Word:</label><input type="text" id="claimSecretInput" placeholder="Enter original password to reveal"></div>
                <button onclick="claimEscrow()" class="submit-btn submit-btn-green">Reveal & Claim Payout</button>
            </div>
            <div id="panel-swap" class="panel-content">
                <h2>🔄 OPN Automated Swap</h2>
                <div class="input-group"><label>Pay:</label><input type="number" value="10"><select style="margin-top: 5px;"><option>OPN</option></select></div>
                <div class="input-group"><label>Receive (Estimated):</label><input type="number" value="0.045" readonly><select style="margin-top: 5px;"><option>shOPN</option></select></div>
                <button onclick="runDeFiAlert('Swap')" class="submit-btn">Execute Token Swap</button>
            </div>
            <div id="panel-bridge" class="panel-content">
                <h2>🌉 Sovereign Interchain Bridge</h2>
                <div class="input-group"><label>From Network:</label><select><option>OPN Chain Testnet</option></select></div>
                <div class="input-group"><label>To Network Target:</label><select><option>Ethereum Sepolia</option></select></div>
                <button onclick="runDeFiAlert('Bridge')" class="submit-btn">Initiate Bridge</button>
            </div>
            <div id="panel-stake" class="panel-content">
                <h2>💰 Ecosystem Liquidity Staking</h2>
                <div class="input-group"><label>Staking Pool Matrix:</label><select><option>Core Validator Pool</option></select></div>
                <button onclick="runDeFiAlert('Staking')" class="submit-btn">Stake Assets</button>
            </div>
        </div>
        <div id="statusText">🔌 System Idle. Click Connect Wallet.</div>
        <button onclick="toggleDebug()" style="background:transparent;border:1px solid #333;color:#888;padding:5px 10px;border-radius:5px;margin-top:10px;cursor:pointer;font-size:11px;">🐛 Toggle Debug</button>
        <div id="debugLog"></div>
    </div>

    <script>
        const OPN_CHAIN_ID = '0x3D8';
        const OPN_CHAIN_RPC = 'https://opn-testnet.rpc.url'; // ⚠️ Replace with actual RPC
        const CONTRACT_ADDRESS = "0xa0772b29afBc2538DDfF58Ae72DA61Ab4725536A";
        const CONTRACT_ABI = [
            "function depositToEscrow(bytes32 _commitment, uint256 _duration) external payable",
            "function claimEscrow(string calldata _secret) external",
            "function getVaultDetails(bytes32 _commitment) external view returns (uint256 value, uint256 lockDuration, bool isLocked, bool isClaimed)"
        ];
        let provider, signer, contract;
        let isConnected = false;

        function debug(msg) {
            const el = document.getElementById("debugLog");
            el.style.display = "block";
            el.innerHTML += `> ${new Date().toLocaleTimeString()} — ${msg}\n`;
            el.scrollTop = el.scrollHeight;
            console.log("[DEBUG]", msg);
        }

        function toggleDebug() {
            const el = document.getElementById("debugLog");
            el.style.display = el.style.display === "none" ? "block" : "none";
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`panel-${tabName}`).classList.add('active');
        }

        function setStatus(msg, color = '#00ffff') {
            const el = document.getElementById("statusText");
            el.innerText = msg;
            el.style.color = color;
            debug(`Status: ${msg}`);
        }

        async function addOrSwitchChain() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: OPN_CHAIN_ID }]
                });
                debug("Chain switched successfully");
            } catch (switchError) {
                if (switchError.code === 4902) {
                    debug("Chain not found, adding it...");
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: OPN_CHAIN_ID,
                            chainName: 'OPN Testnet',
                            rpcUrls: [OPN_CHAIN_RPC],
                            nativeCurrency: { name: 'OPN', symbol: 'OPN', decimals: 18 }
                        }]
                    });
                    debug("Chain added successfully");
                } else {
                    throw switchError;
                }
            }
        }

        async function connectWallet() {
            debug("=== connectWallet() called ===");

            // Check 1: window.ethereum exists?
            if (typeof window.ethereum === 'undefined') {
                debug("✗ window.ethereum is UNDEFINED");
                const hasPhantom = typeof window.solana !== 'undefined';
                const hasSolflare = typeof window.solflare !== 'undefined';
                if (hasPhantom || hasSolflare) {
                    setStatus("⚠️ Solana wallet detected! This DApp needs MetaMask (EVM).", "#ffaa00");
                    alert("🚨 This DApp is built for Ethereum-compatible wallets (MetaMask).\n\nYour wallet appears to be a Solana wallet.\nPlease install MetaMask: https://metamask.io");
                } else {
                    alert("🚨 Please install MetaMask!");
                }
                return;
            }
            debug("✓ window.ethereum is available");

            try {
                // Check 2: ethers loaded?
                if (typeof ethers === 'undefined') {
                    debug("✗ ethers.js NOT loaded! CDN issue.");
                    setStatus("❌ Ethers.js library failed to load. Check internet/CDN.", "#ff3333");
                    return;
                }
                debug("✓ ethers.js version: " + ethers.version);

                // Check 3: MetaMask version
                const mmVersion = window.ethereum.isMetaMask ? "MetaMask" : "Unknown EIP-1193 provider";
                debug("✓ Wallet provider: " + mmVersion);

                // Check 4: Network
                const netVersion = await window.ethereum.request({ method: 'net_version' });
                debug("Current network ID: " + netVersion);

                await addOrSwitchChain();

                // Check 5: Accounts
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (!accounts || accounts.length === 0) {
                    debug("✗ No accounts returned");
                    setStatus("❌ No accounts found. Unlock MetaMask.", "#ff3333");
                    return;
                }
                debug("✓ Account: " + accounts[0]);

                const userAddress = accounts[0];
                const shortAddress = userAddress.slice(0, 6) + "..." + userAddress.slice(-4);
                document.getElementById("connectButton").innerText = shortAddress;

                // Check 6: Provider/Signer/Contract
                provider = new ethers.providers.Web3Provider(window.ethereum);
                debug("✓ Provider created");

                signer = provider.getSigner();
                debug("✓ Signer obtained");

                const balance = await provider.getBalance(userAddress);
                debug("Balance: " + ethers.utils.formatEther(balance) + " ETH/OPN");

                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                debug("✓ Contract created at: " + CONTRACT_ADDRESS);

                // Verify contract exists by checking code
                const code = await provider.getCode(CONTRACT_ADDRESS);
                if (code === '0x' || code === '0x0') {
                    debug("✗ WARNING: No contract code at " + CONTRACT_ADDRESS);
                    setStatus("⚠️ Connected, but contract not found at address! Check CONTRACT_ADDRESS.", "#ffaa00");
                } else {
                    debug("✓ Contract code verified at address");
                    setStatus("✅ Connected to OPN Testnet successfully! Contract ready.", "#00c853");
                }

                isConnected = true;

            } catch (error) {
                debug("✗ Connection error: " + error.message);
                console.error(error);
                setStatus("❌ Connection failed: " + error.message, "#ff3333");
                isConnected = false;
            }
        }

        async function depositToEscrow() {
            debug("=== depositToEscrow() called ===");
            debug("contract exists? " + (contract !== null ? "YES" : "NO"));
            debug("isConnected? " + isConnected);

            if (!contract) {
                debug("✗ BLOCKED: contract is null");
                if (!isConnected) {
                    return alert("Please connect wallet first! Click 'Connect Wallet' button.");
                } else {
                    return alert("⚠️ Wallet connected but contract not initialized. Try reconnecting or check console for errors.");
                }
            }
            try {
                const secret = document.getElementById("secretInput").value.trim();
                const duration = document.getElementById("durationInput").value;
                if (!secret) return alert("Please enter a secret word!");
                if (!duration || duration <= 0) return alert("Duration must be > 0!");

                debug("Secret: " + secret);
                debug("Duration: " + duration);

                const commitment = ethers.utils.solidityKeccak256(["string"], [secret]);
                debug("Commitment: " + commitment);

                const amount = ethers.utils.parseEther("0.1");
                debug("Amount: " + amount.toString());

                setStatus("⏳ Broadcasting escrow deposit...");
                const tx = await contract.depositToEscrow(commitment, duration, { value: amount });
                debug("Tx sent: " + tx.hash);
                setStatus("⏳ Waiting for confirmation...");
                await tx.wait();
                debug("Tx confirmed!");
                setStatus("✅ 0.1 OPN locked in escrow! Tx: " + tx.hash.slice(0, 10) + "...", "#00c853");
            } catch (error) {
                debug("✗ Deposit error: " + error.message);
                alert("Error: " + error.message);
                setStatus("❌ Deposit failed: " + error.message, "#ff3333");
            }
        }

        async function claimEscrow() {
            debug("=== claimEscrow() called ===");
            debug("contract exists? " + (contract !== null ? "YES" : "NO"));

            if (!contract) {
                if (!isConnected) {
                    return alert("Please connect wallet first!");
                } else {
                    return alert("⚠️ Wallet connected but contract not initialized. Try reconnecting.");
                }
            }
            try {
                const secret = document.getElementById("claimSecretInput").value.trim();
                if (!secret) return alert("Please enter the original secret word!");

                debug("Claim secret: " + secret);

                setStatus("⏳ Broadcasting claim...");
                const tx = await contract.claimEscrow(secret);
                debug("Tx sent: " + tx.hash);
                await tx.wait();
                debug("Tx confirmed!");
                setStatus("✅ Payout routed! Tx: " + tx.hash.slice(0, 10) + "...", "#00c853");
            } catch (error) {
                debug("✗ Claim error: " + error.message);
                alert("Claim Failed: " + error.message);
                setStatus("❌ Claim failed: " + error.message, "#ff3333");
            }
        }

        function runDeFiAlert(moduleName) {
            alert(`🚀 OPN ${moduleName} feature will launch in Builder Season 2. Currently, Escrow is live.`);
        }

        // Auto-check on page load
        window.addEventListener('load', () => {
            if (typeof ethers !== 'undefined') {
                debug("✓ Ethers.js loaded on page load: " + ethers.version);
            } else {
                debug("✗ Ethers.js NOT loaded on page load. CDN may be blocked.");
            }
            if (typeof window.ethereum !== 'undefined') {
                debug("✓ MetaMask detected on page load");
            } else {
                debug("✗ No Ethereum wallet detected on page load");
            }
        });
    </script>
</body>
</html>
