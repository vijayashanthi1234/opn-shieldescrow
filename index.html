    <script>
        let provider, signer;
        const contractAddress = "0xa0772b29afBc2538DDfF50Ae72DA61Ab4725536A";
        const contractABI = [
            "function deposit() external payable",
            "function release() external"
        ];

        async function connectWallet() {
            console.log("Button clicked, initializing provider sequence...");
            
            // Explicitly check for any active wallet handler injecting window.ethereum
            let ethereumProvider = window.ethereum;

            // Handle Brave internal wallet routing conflicts safely
            if (window.ethereum && window.ethereum.providers) {
                ethereumProvider = window.ethereum.providers.find(p => p.isMetaMask) || window.ethereum.providers[0];
            }

            if (typeof ethereumProvider !== 'undefined') {
                try {
                    // Update button UI to show it is actively working in the background
                    const connectBtn = document.getElementById('connectBtn');
                    connectBtn.innerText = "Requesting Clearance...";
                    connectBtn.style.opacity = "0.7";

                    // Force request accounts directly via the parsed provider
                    const accounts = await ethereumProvider.request({ method: 'eth_requestAccounts' });
                    
                    if (!accounts || accounts.length === 0) {
                        alert("No accounts active. Please open your wallet manually and select an account.");
                        connectBtn.innerText = "Establish Connection";
                        connectBtn.style.opacity = "1";
                        return;
                    }

                    const activeAccount = accounts[0]; 

                    // Construct ethers wrapper around the verified provider instance
                    provider = new ethers.providers.Web3Provider(ethereumProvider);
                    signer = provider.getSigner();

                    // Instantly push variables to UI elements
                    document.getElementById('walletAddress').innerText = activeAccount;
                    
                    const statusText = document.getElementById('walletStatus');
                    statusText.innerText = "Connected";
                    statusText.style.color = "var(--neon-green)";

                    document.getElementById('indStatus').className = "indicator ind-active";
                    connectBtn.innerText = "Connection Established";
                    connectBtn.disabled = true;
                    console.log("Secure Session Anchored to Account:", activeAccount);

                } catch (error) {
                    console.error("Critical Wallet Trigger Blocked:", error);
                    // Force the button UI back to normal if user cancels or browser rejects
                    const connectBtn = document.getElementById('connectBtn');
                    connectBtn.innerText = "Establish Connection";
                    connectBtn.style.opacity = "1";
                    
                    alert("Browser Blocked Request. Error: " + (error.message || "Shield Interference"));
                }
            } else {
                alert("No crypto wallet extension detected in this browser. Please check your extension settings.");
            }
        }

        async function triggerDeposit() {
            if (!signer) { return alert("Execution Refused: Connect wallet first."); }
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                const depositAmount = prompt("Enter collateral volume to deposit:", "0.1");
                if (!depositAmount) return;

                const tx = await contract.deposit({ value: ethers.utils.parseEther(depositAmount) });
                await tx.wait();
                alert("Deposit finalized!");
            } catch (error) {
                console.error(error);
            }
        }

        async function triggerRelease() {
            if (!signer) { return alert("Execution Refused: Connect wallet first."); }
            try {
                const contract = new ethers.Contract(contractAddress, contractABI, signer);
                const tx = await contract.release();
                await tx.wait();
                alert("Settlement released!");
            } catch (error) {
                console.error(error);
            }
        }
    </script>
