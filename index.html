<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPN ShieldEscrow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif;}
body{background:#030712;color:#fff;line-height:1.6;text-align:center;padding-top:100px;}
.container{width:90%;max-width:600px;margin:auto;background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);}
.btn{padding:14px 28px;border-radius:12px;cursor:pointer;border:none;font-size:15px;font-weight:bold;margin-top:20px;width:100%;}
.primary{background:#2563eb;color:#fff;}
#walletInfo{margin-top:20px;color:#60a5fa;}
.input-box {width: 100%;padding:12px;background:#111827;border:1px solid #334155;border-radius:8px;color:#fff;margin-top:20px;}
</style>
</head>
<body>
<div class="container">
    <h1>🛡️ OPN Secure Tx Gateway</h1>
    <p style="color: #cbd5e1; margin-top:10px;">Execute 100% safe verified on-chain transactions directly to log your decentralized developer builder points.</p>
    <button id="connectBtn" class="btn primary">Connect Wallet</button>
    <div id="walletInfo">Wallet Not Connected</div>
    <input type="number" id="txAmount" class="input-box" value="0.1" step="0.01">
    <button class="btn primary" onclick="sendSecureTx()">Send Verified Transaction</button>
    <div id="statusBox" style="margin-top:20px; display:none; color:#10b981;"></div>
</div>

<script>
const connectBtn = document.getElementById("connectBtn");
const walletInfo = document.getElementById("walletInfo");
let userAccount = "";

connectBtn.addEventListener("click", async () => {
    if (!window.ethereum) return alert("MetaMask not detected!");
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAccount = accounts[0];
    connectBtn.innerText = "Wallet Connected ✅";
    walletInfo.innerHTML = `Connected Account: ${userAccount.slice(0,6)}...${userAccount.slice(-4)}`;
});

async function sendSecureTx() {
    if (!userAccount) return alert("Please connect your wallet first!");
    const amount = document.getElementById("txAmount").value;
    const statusBox = document.getElementById("statusBox");
    try {
        statusBox.style.display = "block";
        statusBox.style.color = "#60a5fa";
        statusBox.innerText = "Preparing secure self-transfer transaction...";
        
        const valueHex = "0x" + BigInt(Math.floor(parseFloat(amount) * 1e18)).toString(16);
        
        // உங்களுக்கே டோக்கன் அனுப்பும் 100% பாதுகாப்பான முறை (No Smart Contract Scam Risk)
        const params = [{
            from: userAccount,
            to: userAccount, 
            value: valueHex
        }];
        
        const txHash = await window.ethereum.request({ method: 'eth_sendTransaction', params });
        statusBox.style.color = "#10b981";
        statusBox.innerText = `🟢 Success! Transaction submitted safely. Hash: ${txHash}`;
    } catch (err) {
        statusBox.style.color = "#ef4444";
        statusBox.innerText = `❌ Error: ${err.message}`;
    }
}
</script>
</body>
</html>
